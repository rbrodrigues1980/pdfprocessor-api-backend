server:
  # Cloud Run injeta a variável PORT; em local usa 8081 como padrão
  port: ${PORT:8081}
  # Cloud Run (e outros proxies reversos) envia X-Forwarded-Proto/Port.
  # Sem isso, o Spring gera URLs com http:// em vez de https:// (ex.: Swagger).
  forward-headers-strategy: framework

spring:
  application:
    name: pdfprocessor-api-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  data:
    mongodb:
      # Em Cloud Run: defina SPRING_DATA_MONGODB_URI nas variáveis do serviço.
      # Em local:    o profile "local" (application-local.yml) sobrescreve com a URI do Atlas HML.
      #              O application-local.yml está no .gitignore (nunca commitado).
      uri: ${SPRING_DATA_MONGODB_URI:}

# Connection pool do MongoDB — otimizado para Cloud Run (serverless).
# Cloud Run congela instâncias ociosas, matando conexões TCP silenciosamente.
# Sem esses ajustes, o driver tenta reusar conexões mortas → MongoSocketWriteException / SSLEngine closed.
# Usado pelo MongoCloudRunConfig.java
mongodb:
  pool:
    max-size: ${MONGO_POOL_MAX_SIZE:5}
    min-size: ${MONGO_POOL_MIN_SIZE:0}
    max-idle-time-ms: ${MONGO_MAX_IDLE_TIME_MS:30000}
    max-life-time-ms: ${MONGO_MAX_LIFE_TIME_MS:300000}
    max-connecting: ${MONGO_MAX_CONNECTING:2}
  # Timeouts — failover rápido durante manutenção do Atlas (ShutdownInProgress)
  server-selection-timeout-ms: ${MONGO_SERVER_SELECTION_TIMEOUT_MS:5000}
  socket-timeout-ms: ${MONGO_SOCKET_TIMEOUT_MS:30000}
  connect-timeout-ms: ${MONGO_CONNECT_TIMEOUT_MS:5000}

jwt:
  # Em Cloud Run: defina JWT_SECRET via Secret Manager.
  # Em local:    o profile "local" (application-local.yml) sobrescreve.
  secret: ${JWT_SECRET:}
  expiration: ${JWT_EXPIRATION:43200000} # 12 horas (em ms)
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:2592000000} # 30 dias (conforme documentação)

app:
  security:
    force2fa-global: false # Forçar 2FA globalmente (pode ser ativado por tenant ou usuário)
  cors:
    # Origens locais (desenvolvimento)
    allowed-origins:
      - http://localhost:5173
      - http://127.0.0.1:5173
      - http://localhost:3000
      - http://127.0.0.1:3000
      - http://localhost
      - http://localhost:80
      - http://127.0.0.1
      - http://127.0.0.1:80
    # Para Cloud Run / produção, defina a variável de ambiente:
    # APP_CORS_EXTRA_ORIGINS=https://meu-frontend.us-central1.run.app,https://meudominio.com
  logging:
    mongo:
      enabled: false

# Gemini AI Configuration (para PDFs escaneados e extração inteligente)
# Documentação completa: docs/API_GEMINI_AI.md
gemini:
  enabled: false  # Habilitar quando tiver credenciais GCP configuradas
  project-id: ${GOOGLE_CLOUD_PROJECT:}
  location: ${GEMINI_LOCATION:us-central1}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  fallback-model: ${GEMINI_FALLBACK_MODEL:gemini-2.5-pro}
  max-output-tokens: 8192
  temperature: 0.1
  timeout-seconds: 120
