# ============================================
# COMANDOS ÚTEIS
# ============================================
#
# --- Subir a infra (apenas API, usando MongoDB Atlas) ---
# docker compose up -d
#
# --- Subir a infra COM MongoDB local ---
# docker compose --profile with-mongodb up -d
#
# --- Build/rebuild da imagem da API ---
# docker compose build
# docker compose build --no-cache        (forçar rebuild completo)
#
# --- Ver logs em tempo real ---
# docker compose logs -f
# docker compose logs -f api             (só da API)
#
# --- Parar tudo (mantém volumes/dados) ---
# docker compose down
#
# --- Parar e remover volumes (APAGA dados do MongoDB local) ---
# docker compose down -v
#
# --- Reiniciar um serviço ---
# docker compose restart api
#
# --- Reiniciar tudo ---
# docker compose restart
#
# --- Ver status dos containers ---
# docker compose ps
#
# --- Remover imagens do projeto ---
# docker compose down --rmi local        (remove só imagens buildadas localmente)
# docker compose down --rmi all          (remove todas as imagens usadas)
#
# --- Limpar tudo (containers + volumes + imagens) ---
# docker compose down -v --rmi all
#
# --- Limpeza geral do Docker (imagens/containers/volumes sem uso) ---
# docker system prune -af
# docker volume prune -f
#
# ============================================

name: infra-pdfprocessor

services:
  # ============================================
  # API Backend - PDF Processor
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdfprocessor-api
    ports:
      - "8081:8081"
    environment:
      # Spring Profiles
      - SPRING_PROFILES_ACTIVE=docker

      # MongoDB Local (container pdfprocessor-mongodb)
      - SPRING_DATA_MONGODB_URI=mongodb://admin:admin123@pdfprocessor-mongodb:27017/pdfprocessor?authSource=admin

      # JWT Configuration
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-key-change-in-production}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-900000}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-2592000000}

      # Server Configuration
      - SERVER_PORT=8081

      # Logging
      - LOGGING_LEVEL_ROOT=INFO
      - LOGGING_LEVEL_BR_COM_VERTICELABS=DEBUG
    volumes:
      # Volume para logs persistentes
      - ./logs:/app/logs
      # Volume para arquivos temporários (opcional)
      - ./temp:/app/temp
    depends_on:
      - mongodb
    networks:
      - pdfprocessor-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================
  # MongoDB Local (opcional - para desenvolvimento)
  # ============================================
  mongodb:
    image: mongo:7.0
    container_name: pdfprocessor-mongodb
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-admin123}
      - MONGO_INITDB_DATABASE=pdfprocessor-hml
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - pdfprocessor-network
    restart: unless-stopped

networks:
  pdfprocessor-network:
    driver: bridge

volumes:
  mongodb_data:
  mongodb_config:
